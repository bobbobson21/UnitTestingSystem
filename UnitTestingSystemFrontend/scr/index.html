<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">

    <link rel="stylesheet" href="index.css"/>
	<script src = "contentModifyer.js"></script>
</head>

<script>
	var inapi = {scaningFolder: "", fileData: [], combineNodes: true, showNotices: false}
</script>

<body onresize="SizeCheck()">

<!--windows bar-->
	<div class="DragBar" style="height: 24px; width: 100vw; position: fixed; top: 0px; padding-top:2px; padding-bottom:2px;">
		<table style="width:100%; margin: 0; padding: 0; position: relative; top: 0; margin-top:-4px;">
			<tr>
				<th style = "width: 50%; margin: 0; padding: 0;">
					<div style = "float: left;">
						<p class = "dragBarText">&#xa0;&#xa0;Unit Testing System Analyzer</p>
					</div>
				</th>
				<th style = "width: 50%; margin: 0; padding: 0;">
					<button onclick='api.ModWindow({close:true})' class = "DragBarButtonCls" style = "height: 24px;"><p class = "dragBarText">✕</p></button>
					<button onclick='api.ModWindow({max:true})' class = "DragBarButton" style = "height: 24px;"><p class = "dragBarText">❐</p></button>
					<button onclick='api.ModWindow({min:true})' class = "DragBarButton" style = "height: 24px;"><p class = "dragBarText">⎯</p></button>
					<!--<button onclick='//SHOW SETTINGS CODE GOSE HERE' class = "DragBarButton" style = "height: 24px; margin-right: 10px"><p class = "dragBarText">⌬</p></button>-->
				</th>
			</tr>
		</table>
	</div>


<!--top bar-->
	<div style="width: 100vw; margin-top:24px; padding-top: 4px; position: fixed; background-color: rgba(0, 0, 0, 0.25);">

		<button class = "ButtonBasic" style = "margin-left: 4px; width: 140px; height: 24px; background-color: rgb(20, 20, 20);" name = "button_shownotices" onclick = 'inapi.combineNodes = !inapi.combineNodes; ToggleStyle("button_shownotices", "backgroundColor", "rgb(128, 128, 128)", "rgb(20, 20, 20)"); ToggleStyle("button_text_shownotices", "color", "rgb(128, 128, 128)", "rgb(20, 20, 20)"); ToggleText( "button_text_shownotices", "show notices: on", "show notices: off" );'>
			<p style = "margin-left: 8px; margin-right: 8px; text-align: center; color: rgb(128, 128, 128);" name = "button_text_shownotices">show notices: off<p>
		</button>

		<button class = "ButtonBasic" style = "height: 24px; width: calc(100% - 152px); background-color: rgb(128, 128, 128);" name = "button_mergeRes" onclick = 'inapi.combineNodes = !inapi.combineNodes; ToggleStyle("button_mergeRes", "backgroundColor", "rgb(128, 128, 128)", "rgb(20, 20, 20)"); ToggleStyle("button_text_mergeRes", "color", "rgb(128, 128, 128)", "rgb(20, 20, 20)"); ToggleText( "button_text_mergeRes", "merge results: on", "merge results: off" );'>
			<p style = "margin-left: 8px; margin-right: 8px; text-align: center; color: rgb(20, 20, 20);" name = "button_text_mergeRes">merge results: on<p>
		</button>

		<div class= "TopBarDivider" style="height: 2px; width: 100vw; margin-top:4px;"></div>
	</div>

<!--load in file content-->
	<script>
		function SelectProjectFolder(starting)
		{
			api.SelectDirectoryAsset({title: "select cmake or visual studios project folder", properties: ['openDirectory']}).then((result) => {
				if(result.success == false && starting == true)
				{
					api.ModWindow({close:true})
				}

				if(result.success == true)
				{
					inapi.scaningFolder = result.results[0];
				}
			})
		}
	</script>

	<script>
		function LoadChanges()
		{
			api.ReadFile({path: scaningFoloder, title: "UTSext", type: "dat",}).then((result) => {
				let fileContents = "failed to reach";
		
				if(result.success == true)
				{
					fileContents = JSON.parse(result.contents);
				
					if(fileContents != null)
					{
						inapi.fileData[inapi.fileData.length] = fileContents;

						
						while(api.CreateFile({path: scaningFoloder, title: "UTSext", type: "dat", contents: ""}).success == false) {}
						
						return;
					}
				}
			})

			requestAnimationFrame(LoadChanges);
		}
	</script>

<!--Funcs: sizing viewports-->
	<script>
		function SizeCheck()
		{

		}
	</script>
	
<!--Funcs: startup procdure/init/onsart-->
	<script>	
		SizeCheck();
		SelectProjectFolder(true);
		while(true) {LoadChanges(); }
	</script>
</body>
</html>
