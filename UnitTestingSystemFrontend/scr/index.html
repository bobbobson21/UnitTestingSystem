<!--load in file content-->
	<script>
		function LoadChanges()
		{
			api.ReadFile({title: "FrontEndSave", type: "json",}).then((result) => {
				let fileContents = "failed to reach";
		
				if(result.success == true)
				{
					fileContents = JSON.parse(result.contents);
				
					if(fileContents != null)
					{
						inapi.eventData = fileContents;
						console.log({success:true,debugData:[result, fileContents, inapi.eventData]});
						
						ReloadMainTimeView();
						
						return;
					}
				}
				
				console.log({success:false,debugData:[result, fileContents]});
			})
		}
	</script>
